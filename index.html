    <style>
        :root {
            --bg: #050507;
            --text: #e2e2e5;
            --text-muted: #888899;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(15, 15, 20, 0.6);
            --glass-panel: rgba(25, 25, 30, 0.5);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            --accent: #00e5ff;
            --accent-dim: rgba(0, 229, 255, 0.15);
            --mosaic-opacity: 0.15;
            --mosaic-filter: grayscale(80%) contrast(120%);
            --hero-gradient: linear-gradient(135deg, rgba(15,15,20,0.8), rgba(5,5,7,0.95));
            
            --mood-optimistic: #ffd700;
            --mood-pessimistic: #ff4a4a;
            --mood-melancholic: #4169e1;
            --mood-surreal: #d255ff;
            --mood-tense: #ff8800;
            --mood-gritty: #b87333;
            --mood-satirical: #ccff00;
            --mood-cerebral: #00e5ff;
            --mood-eerie: #a3ccaa;
            --mood-unknown: #777777;
            
            --med-written: #00e5ff;
            --med-film: #ff4a8a;
            --med-animated: #39ff14;
            --med-comic: #ffaa00;
            --med-game: #b829ff;
        }
        
        [data-theme="light"] {
            --bg: #f4f4f6;
            --text: #1a1a1c;
            --text-muted: #666677;
            --border: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-panel: rgba(240, 240, 245, 0.6);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --accent: #0055ff;
            --accent-dim: rgba(0, 85, 255, 0.1);
            --mosaic-opacity: 0.08;
            --mosaic-filter: grayscale(100%) contrast(90%) brightness(120%);
            --hero-gradient: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(240,240,245,0.95));
            
            --med-written: #0077cc;
            --med-film: #d9004c;
            --med-animated: #009900;
            --med-comic: #cc6600;
            --med-game: #720e9e;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; padding: 0 2rem 4rem 2rem; overflow-x: hidden; transition: background-color 0.5s ease, color 0.5s ease; }
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; z-index: -2; pointer-events: none; }
        
        /* --- TOP CONTROLS --- */
        .top-controls { position: absolute; top: 2rem; right: 2rem; display: flex; gap: 1rem; z-index: 100; }
        .top-btn { background: var(--glass-bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: 600; backdrop-filter: blur(10px); transition: all 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        .top-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        .site-bg { position: fixed; top: -20vh; left: -20vw; width: 140vw; height: 140vh; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 1rem; opacity: var(--mosaic-opacity); z-index: -1; transform: rotate(-3deg) scale(1.1); pointer-events: none; transition: opacity 0.5s ease, filter 0.5s ease; }
        .site-bg img { width: 120px; height: 180px; object-fit: cover; border-radius: 4px; box-shadow: 0 0 15px rgba(0,0,0,0.5); filter: var(--mosaic-filter); }
        
        header { text-align: center; margin-bottom: 2rem; padding: 4rem 2rem 2rem 2rem; }
        header h1 { margin: 0; font-size: 3rem; letter-spacing: 0.1em; }
        header .subtitle { margin: 0.5rem 0 0; font-size: 1rem; opacity: 0.6; font-weight: 400; }
        h1 { font-family: 'Michroma', sans-serif; font-size: 3.5rem; color: var(--text); text-transform: uppercase; letter-spacing: 0.15em; margin: 0; text-shadow: 0 10px 30px var(--glass-shadow); transition: color 0.5s ease; }
        
        .loading { text-align: center; color: var(--text-muted); font-size: 1.2rem; padding: 3rem; grid-column: 1 / -1; }
        .error-message { color: var(--mood-pessimistic); border: 1px solid var(--mood-pessimistic); background: rgba(255, 42, 42, 0.05); padding: 1rem; border-radius: 8px; backdrop-filter: blur(5px); }
        
        /* --- CONTROL CENTER & COLLAPSIBLE FILTERS --- */
        .control-center { position: sticky; top: 0.25rem; z-index: 50; background: var(--glass-panel); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 3rem; box-shadow: 0 10px 40px var(--glass-shadow); transition: all 0.3s ease; }
        .search-container { display: flex; justify-content: center; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
        
        .sort-select { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 0.8rem 1.2rem; border-radius: 30px; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600; outline: none; transition: all 0.3s ease; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888899' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; padding-right: 2.5rem; }
        .sort-select:hover, .sort-select:focus { border-color: var(--accent); color: var(--text); box-shadow: 0 0 10px var(--accent-dim); }

        .search-input { flex: 1; max-width: 600px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.8rem 1.5rem; border-radius: 30px; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; outline: none; transition: all 0.3s ease; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); }
        .search-input::placeholder { color: var(--text-muted); font-weight: 300; }
        
        .toggle-filters-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 0.8rem 1.2rem; border-radius: 30px; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; transition: all 0.3s ease; outline: none; }
        .toggle-filters-btn:hover, .toggle-filters-btn.active { border-color: var(--accent); color: var(--text); box-shadow: 0 0 10px var(--accent-dim); }
        
        .filter-collapsible { overflow: hidden; max-height: 500px; opacity: 1; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .filter-collapsible.collapsed { max-height: 0; opacity: 0; pointer-events: none; margin-top: -1rem; }
        
        .filters { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; padding-top: 0.5rem;}
        .filter-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 0.5rem 1.2rem; cursor: pointer; font-family: inherit; transition: all 0.2s; border-radius: 20px; font-weight: 600; }
        .filter-btn:hover { color: var(--text); background: var(--border); }
        .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        
        .tag-filters { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .tag-select-group { display: flex; flex-direction: column; gap: 0.25rem; }
        .tag-select-group label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-left: 0.5rem; }
        .tag-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none; cursor: pointer; min-width: 140px; transition: border-color 0.2s; appearance: none; }
        .tag-select:focus { border-color: var(--accent); }
        
        /* --- METRICS & BADGES --- */
        .badge-row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
        .medium-badge { display: inline-flex; align-items: center; width: fit-content; max-width: max-content; background: var(--theme-med-dim); color: var(--theme-med); border: 1px solid color-mix(in srgb, var(--theme-med) 50%, transparent); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; backdrop-filter: blur(4px); box-shadow: 0 4px 15px var(--theme-med-dim); }
        
        .metric-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; color: var(--text); backdrop-filter: blur(4px); }
        .obscurity-bar { display: inline-flex; align-items: center; gap: 0.4rem; }
        .obscurity-track { width: 50px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .obscurity-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }
        .obscurity-fill.mainstream { background: #4ade80; }
        .obscurity-fill.cult { background: #facc15; }
        .obscurity-fill.deep { background: #fb923c; }
        .obscurity-fill.outer { background: #f87171; }
        .obscurity-text { font-size: 0.7rem; color: var(--text-muted); }
        
        .star-filled { color: var(--accent); }
        .star-empty { color: var(--text-muted); opacity: 0.3; }
        
        /* True Half-Star Implementation */
        .star-half { 
            position: relative; 
            display: inline-block; 
        }
        .star-half::before { 
            content: '★'; 
            color: var(--text-muted); 
            opacity: 0.3; 
        }
        .star-half::after { 
            content: '★'; 
            position: absolute; 
            left: 0; 
            top: 0; 
            color: var(--accent); 
            width: 50%; /* This precisely cuts the colored star in half */
            overflow: hidden; 
        }
        
        .rating-num { color: var(--text-muted); font-size: 0.75rem; margin-left: 0.4rem; font-weight: 700; }

        .metric-icon { color: var(--accent); font-size: 0.9rem; line-height: 1; }
        .metric-badge.ghost { color: var(--accent); border-color: var(--accent); text-shadow: 0 0 8px var(--accent-dim); box-shadow: 0 0 10px var(--accent-dim); animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }

        /* --- TOP PICKS FEATURED SECTION --- */
        .top-picks-container { background: var(--hero-gradient); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; transition: all 0.5s ease; box-shadow: 0 20px 50px var(--glass-shadow); position: relative; overflow: hidden; backdrop-filter: blur(12px); animation: driftUp 0.6s ease backwards; }
        .top-picks-container::before { content: ''; position: absolute; top: 0; right: 0; width: 60%; height: 100%; background: radial-gradient(circle at top right, var(--accent-dim), transparent 70%); pointer-events: none; }
        .top-picks-container.hidden { display: none; }
        .top-picks-container.fade-out { opacity: 0; transform: scale(0.98); }
        
        .top-picks-header { position: relative; z-index: 2; text-align: center; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem;}
        .top-picks-header::before, .top-picks-header::after { content: ''; height: 1px; flex: 1; background: linear-gradient(90deg, transparent, var(--border), transparent); max-width: 200px; }
        .top-picks-header h2 { font-family: 'Michroma', sans-serif; font-size: 1rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin: 0; text-shadow: 0 0 10px var(--accent-dim); }
        
        .top-picks-grid { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; }
        .top-pick-card { background: var(--glass-bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; aspect-ratio: 2 / 3; transition: all 0.3s ease; box-shadow: 0 10px 20px var(--glass-shadow); display: flex; flex-direction: column; justify-content: flex-end; }
        .top-pick-card:hover { border-color: var(--theme-mood); transform: translateY(-5px); box-shadow: 0 15px 30px var(--theme-mood-dim); z-index: 10; }
        .top-pick-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.7) contrast(1.1); transition: all 0.5s ease; z-index: 0; }
        .top-pick-card:hover img { filter: brightness(0.3) blur(2px); transform: scale(1.05); }
        
        .top-pick-content { position: relative; z-index: 2; padding: 1.5rem 1rem 1rem; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }
        .top-pick-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 40%, transparent 100%); z-index: 1; pointer-events: none; }
        
        .top-pick-title { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); line-height: 1.2; }
        .top-pick-year { font-weight: 300; opacity: 0.7; font-size: 0.85em; }
        .top-pick-badges .badge-row { margin-bottom: 0; } 
        .top-pick-badges .metric-badge { padding: 0.2rem 0.4rem; font-size: 0.65rem; }
        .top-pick-badges .rating-num { margin-left: 0.2rem; }
        
        /* --- GRID CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2rem; }
        .card { background: var(--glass-bg); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; position: relative; overflow: hidden; aspect-ratio: 2 / 3; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px var(--glass-shadow); backdrop-filter: blur(8px); animation: driftUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
        @keyframes driftUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { border-color: var(--theme-mood); transform: translateY(-5px) scale(1.02); z-index: 10; box-shadow: 0 15px 40px var(--theme-mood-dim); }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: all 0.5s ease; }
        .card:hover img { opacity: 0.15; filter: grayscale(80%) blur(2px); }
        
        .card-title-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 4rem 1.5rem 1.5rem; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); pointer-events: none; }
        .card-title-bar h2 { font-size: 1.2rem; margin: 0; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.8); font-weight: 600;}
        
        .card-hover-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 2rem 2rem 5.5rem 2rem; opacity: 0; display: flex; flex-direction: column; justify-content: center; transition: opacity 0.4s ease; pointer-events: none; background: radial-gradient(circle at center, var(--theme-mood-dim) 0%, transparent 100%); }
        .card:hover .card-hover-content { opacity: 1; }
        .card .tag-display { font-size: 0.75rem; color: #fff; margin-bottom: 0.5rem; font-weight: 600; opacity: 0.9; letter-spacing: 0.05em;}
        .card .pitch { font-size: 1rem; color: #f0f0f0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); line-height: 1.5; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* --- MODALS --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); padding: 2rem; overflow-y: auto; z-index: 100; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); align-items: center; justify-content: center; }
        .modal.open { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content { display: flex; width: 100%; max-width: 1000px; max-height: 85vh; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 25px 80px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        
        .modal-gallery { flex: 0 0 40%; background: var(--card-bg); position: relative; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow: hidden; }
        .modal-gallery-backdrop { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; object-fit: cover; filter: blur(30px) opacity(0.4); z-index: 0; pointer-events: none; }
        .modal-gallery img.main-art { width: 100%; height: 100%; object-fit: contain; opacity: 0.95; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1; position: relative;}
        
        .modal-text-area { flex: 1; padding: 3rem; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 1.5rem; right: 2rem; background: var(--border); border: none; color: var(--text); width: 40px; height: 40px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .modal-close:hover { background: var(--accent); color: #fff; transform: scale(1.1); }
        .modal h2 { font-family: 'Michroma', sans-serif; color: var(--text); margin-bottom: 0.5rem; font-size: 2.2rem; line-height: 1.2;}
        .modal h3 { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1rem; padding-bottom: 0.5rem; margin-top: 2.5rem; }
        .modal p { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 300; line-height: 1.7;}
        .modal strong { color: var(--text); font-weight: 600; }
        
        .share-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; white-space: nowrap;}
        .share-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* --- STATS DASHBOARD --- */
        .stats-content { max-width: 800px; flex-direction: column; padding: 4rem 3rem; overflow-y: auto; }
        .total-count-box { text-align: center; margin-bottom: 3rem; }
        .total-count-box .label { font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 0.5rem;}
        .total-count-box .number { font-size: 5rem; font-family: 'Michroma', sans-serif; line-height: 1; text-shadow: 0 0 30px var(--accent-dim); color: var(--text); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
        .stat-section h3 { font-family: 'Michroma', sans-serif; margin-bottom: 1.5rem; color: var(--accent); font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;}
        .stat-row { display: flex; align-items: center; margin-bottom: 1rem; font-size: 0.85rem; }
        .stat-label { width: 120px; font-weight: 600; text-transform: uppercase; color: var(--text); }
        .stat-bar-bg { flex: 1; background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; position: relative; margin: 0 1rem; }
        .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 0 10px currentColor; }
        .stat-value { width: 30px; text-align: right; font-family: 'Michroma', sans-serif; color: var(--text-muted); }

        footer { text-align: center; margin-top: 4rem; padding-top: 2rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 300;}
        
        @media (max-width: 1100px) { 
            .top-picks-grid { grid-template-columns: repeat(3, 1fr); }
            .top-pick-card:nth-child(n+4) { display: none; } 
        }
        
        @media (max-width: 900px) { .modal-content { flex-direction: column; max-height: 90vh; } .modal-gallery { flex: none; height: 300px; } .modal-text-area { padding: 2rem; } .stats-grid { grid-template-columns: 1fr; gap: 2rem; } }
        
        /* Mobile Layout Tweaks */
        @media (max-width: 768px) { 
            body { padding: 0 1rem 2rem 1rem; } 
            header { padding: 6rem 1rem 2rem 1rem; } 
            h1 { font-size: 2rem; } 
            .top-controls { top: 1rem; right: 1rem; flex-direction: column; gap: 0.5rem; } 
            .top-btn { font-size: 0.75rem; padding: 0.4rem 0.8rem; justify-content: center;} 
            .control-center { padding: 1rem; } 
            
            .search-container { flex-wrap: wrap; justify-content: space-between; gap: 0.5rem;} 
            .search-input { width: 100%; max-width: 100%; order: 1; flex: none;}
            .sort-select { width: 48%; order: 2; padding-left: 0.8rem; padding-right: 2rem; flex: none;}
            .toggle-filters-btn { width: 48%; order: 3; justify-content: center; flex: none;}
            
            .top-picks-container { padding: 1.5rem; }
            .top-picks-grid { grid-template-columns: 1fr; max-width: 280px; margin: 0 auto; }
            .top-pick-card:nth-child(n+2) { display: none; } 
            
            .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } 
            .card-title-bar { padding: 2rem 0.75rem 0.75rem; } 
            .card-title-bar h2 { font-size: 0.9rem; } 
            .card-hover-content { padding: 1rem 1rem 4rem 1rem; } 
            .card .tag-display { font-size: 0.6rem; margin-bottom: 0.5rem; } 
            .card .pitch { font-size: 0.75rem; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; } 
            .stats-content { padding: 2rem 1.5rem; } 
            .total-count-box .number { font-size: 3.5rem; } 
            .stat-label { width: 90px; font-size: 0.75rem;} 
            .filter-collapsible { max-height: 1000px; } 
        }
    </style>
</head>
<body>
    
    <div class="top-controls">
        <button class="top-btn" onclick="openStats()">📊 Telemetry</button>
        <button class="top-btn" onclick="toggleTheme()" id="themeBtn">☀ Light Mode</button>
    </div>

    <div id="siteBg" class="site-bg"></div>
    <header><h1>All Futures</h1><p class="subtitle">Archiving visions of times ahead</p></header>
    
    <div class="control-center">
        <div class="search-container">
            <select id="sortFilter" class="sort-select" onchange="loadMedia()">
                <option value="recent">Sort: Added</option>
                <option value="year">Sort: Year</option>

            <button class="toggle-filters-btn" id="filterToggleBtn" onclick="toggleFilters(event)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                Filters
            </button>
        </div>
        
        <div id="filterCollapsible" class="filter-collapsible collapsed">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All Visions</button>
                <button class="filter-btn" data-filter="Novel">Novels</button>
                <button class="filter-btn" data-filter="Short Story">Short Stories</button>
                <button class="filter-btn" data-filter="Graphic Novel">Graphic Novels</button>
                <button class="filter-btn" data-filter="Manga">Manga</button>
                <button class="filter-btn" data-filter="Film">Films</button>
                <button class="filter-btn" data-filter="Anime">Anime</button>
                <button class="filter-btn" data-filter="Game">Games</button>
            </div>
            <div class="tag-filters">
                <div class="tag-select-group"><label>Origin</label><select id="countryFilter" class="tag-select" onchange="loadMedia()"><option value="all">Global</option></select></div>
                <div class="tag-select-group"><label>Mood</label><select id="moodFilter" class="tag-select" onchange="loadMedia()"><option value="all">Any Emotion</option></select></div>
                <div class="tag-select-group"><label>Sub-Genre</label><select id="genreFilter" class="tag-select" onchange="loadMedia()"><option value="all">All Genres</option></select></div>
                <div class="tag-select-group"><label>Topic</label><select id="topicFilter" class="tag-select" onchange="loadMedia()"><option value="all">All Concepts</option></select></div>
                
                <div class="tag-select-group">
                    <label>Min Rating</label>
                    <select id="ratingFilter" class="tag-select" onchange="loadMedia()">
                        <option value="all">Any Score</option>
                        <option value="4">★★★★☆ (4+)</option>
                        <option value="3">★★★☆☆ (3+)</option>
                        <option value="2">★★☆☆☆ (2+)</option>
                    </select>
                </div>
                <div class="tag-select-group">
                    <label>Obscurity</label>
                    <select id="obscurityFilter" class="tag-select" onchange="loadMedia()">
                        <option value="all">All Levels</option>
                        <option value="mainstream">Mainstream (< 30%)</option>
                        <option value="cult">Cult Classic (30-60%)</option>
                        <option value="deep">Deep Cut (60-90%)</option>

        <div class="modal-content">
            <div class="modal-gallery">
                <img id="modalImgBg" class="modal-gallery-backdrop" src="" alt="">
                <img id="modalImg" class="main-art" src="" alt="Cover Art">

            <div id="statsBody"></div>

    <footer><p>A Personal Archive of Tomorrow</p></footer>

<script>
function initTheme() { const saved = localStorage.getItem('archive-theme') || 'dark'; if (saved === 'light') { document.documentElement.setAttribute('data-theme', 'light'); document.getElementById('themeBtn').innerText = '☾ Dark Mode'; } }
function toggleTheme() { const current = document.documentElement.getAttribute('data-theme'); if (current === 'light') { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('archive-theme', 'dark'); document.getElementById('themeBtn').innerText = '☀ Light Mode'; } else { document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('archive-theme', 'light'); document.getElementById('themeBtn').innerText = '☾ Dark Mode'; } }
initTheme();

function toggleFilters(e) {
    if(e) e.stopPropagation();
    const collapsible = document.getElementById('filterCollapsible');
    const btn = document.getElementById('filterToggleBtn');
    collapsible.classList.toggle('collapsed');
    btn.classList.toggle('active');
}

// Click outside to close filters
document.addEventListener('click', function(event) {
    const collapsible = document.getElementById('filterCollapsible');
    const btn = document.getElementById('filterToggleBtn');
    const controlCenter = document.querySelector('.control-center');
    
    if (!collapsible.classList.contains('collapsed') && !controlCenter.contains(event.target)) {
        collapsible.classList.add('collapsed');
        btn.classList.remove('active');
    }
});

let media = [], currentFilteredMedia = [], heroInterval;
const uniqueCountries = new Set(), uniqueMoods = new Set(), uniqueGenres = new Set(), uniqueTopics = new Set();

function getMoodColorVar(mood) { const m = mood.toLowerCase(); if (['optimistic','pessimistic','melancholic','surreal','tense','gritty','satirical','cerebral','eerie'].includes(m)) return 'var(--mood-' + m + ')'; return 'var(--mood-unknown)'; }
function getMoodHexForPlaceholder(mood) { const map = {'optimistic':'ffd700','pessimistic':'ff4a4a','melancholic':'4169e1','surreal':'d255ff','tense':'ff8800','gritty':'b87333','satirical':'ccff00','cerebral':'00e5ff','eerie':'a3ccaa'}; return map[mood.toLowerCase()] || '555555'; }

function getMediumColorVar(medium) { 
    const m = medium.toLowerCase(); 
    if (m.includes('manga') || m.includes('comic') || m.includes('graphic')) return 'var(--med-comic)'; 
    if (m.includes('novel') || m.includes('story')) return 'var(--med-written)'; 
    if (m.includes('anime') || m.includes('animat')) return 'var(--med-animated)'; 
    if (m.includes('film') || m.includes('movie')) return 'var(--med-film)'; 
    if (m.includes('game') || m.includes('interactive')) return 'var(--med-game)'; 
    return 'var(--accent)'; 
}

function generateStars(rating) {
    if (rating === null) return "";
    const fullStars = Math.floor(rating);
    const hasHalf = rating % 1 >= 0.5;
    let stars = "";
    for (let i = 0; i < 5; i++) {
        if (i < fullStars) stars += '<span class="star-filled">★</span>';
        else if (i === fullStars && hasHalf) stars += '<span class="star-half"></span>';
        else stars += '<span class="star-empty">★</span>';
    }
    return stars + ' <span class="rating-num">' + rating.toFixed(1) + '</span>';
}

function generateMetricsHtml(m) {
    if (m.rating === null && m.ratingsCount === null) return ''; 
    
    let html = '<div class="badge-row" style="margin-top: 0.5rem; margin-bottom: 0.5rem;">';
    if (m.rating !== null) {
        html += `<span class="metric-badge">${generateStars(m.rating)}</span>`;
    }
    
    if (m.obscurityTier === 'ghost') {
        html += `<span class="metric-badge ghost"><span class="metric-icon">👁</span> GHOST DATA</span>`;
    } else if (m.obscurityPct !== null) {
        html += `<span class="metric-badge"><div class="obscurity-bar"><span class="obscurity-text">Obscurity:</span><div class="obscurity-track"><div class="obscurity-fill ${m.obscurityTier}" style="width:${m.obscurityPct}%"></div></div></div></span>`;
    }
    html += '</div>';
    return html;
}

function populateDropdowns() { 
    const populate = (s,id) => { const sel = document.getElementById(id); Array.from(s).sort().forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.textContent = t; sel.appendChild(opt); }); }; 
    populate(uniqueCountries,'countryFilter'); populate(uniqueMoods,'moodFilter'); populate(uniqueGenres,'genreFilter'); populate(uniqueTopics,'topicFilter'); 
}

function buildSiteMosaic() { 
    const c = document.getElementById('siteBg'); if(!c||media.length===0)return; 
    let list=[]; while(list.length<100) list=list.concat([...media].sort(()=>0.5-Math.random())); 
    list.slice(0,100).forEach(m => { 
        const img = document.createElement('img'); img.src = m.image; 
        img.onerror = function(){this.onerror=null;this.src='https://placehold.co/120x180/'+getMoodHexForPlaceholder(m.tags.mood[0]||'Unknown')+'/000000?text='+encodeURIComponent(m.title).replace(/'/g,"%27");}; 
        c.appendChild(img); 
    }); 
}

async function loadMediaList() { 
    const g = document.getElementById('mediaGrid'); 
    try { 
        const r = await fetch('archive_content.json');
        const data = await r.json();
        
        media = data.entries.map(entry => {
            const tags = {
                country: entry.origin ? entry.origin.split(',').map(t => t.trim()).filter(t => t) : [],
                mood: entry.mood ? entry.mood.split(',').map(t => t.trim()).filter(t => t) : [],
                genre: entry.sub_genres ? entry.sub_genres.split(',').map(t => t.trim()).filter(t => t) : [],
                topic: entry.topics ? entry.topics.split(',').map(t => t.trim()).filter(t => t) : []
            };
            
            let rating = entry.raw_score;
            let ratingsCount = entry.total_ratings || 0;
            let obscurityTier, obscurityPct;
            
            if (ratingsCount >= 100000) { obscurityTier = 'mainstream'; obscurityPct = Math.max(0, 30 - Math.floor(ratingsCount/100000)); }
            else if (ratingsCount >= 10000) { obscurityTier = 'cult'; obscurityPct = Math.max(30, 60 - Math.floor(ratingsCount/2500)); }
            else if (ratingsCount >= 1000) { obscurityTier = 'deep'; obscurityPct = Math.max(60, 90 - Math.floor(ratingsCount/300)); }
            else if (ratingsCount > 0) { obscurityTier = 'outer'; obscurityPct = Math.min(99, 90 + Math.floor((1000-ratingsCount)/100)); }
            else { obscurityTier = 'ghost'; obscurityPct = 100; }
            
            const pm = tags.mood[0] || 'Unknown';
            const safeTitle = encodeURIComponent(entry.title).replace(/'/g,"%27");
            const fallbackUrl = 'https://placehold.co/400x600/'+getMoodHexForPlaceholder(pm)+'/000000?text='+safeTitle;
            
            return {
                title: entry.title,
                slug: entry.title.toLowerCase().replace(/[^a-z0-9]+/g, '-') + (entry.year ? '-' + entry.year : ''),
                year: entry.year ? `(${entry.year})` : '',
                medium: entry.medium,
                creator: entry.creator || '',
                pitch: entry.pitch ? entry.pitch.substring(0, 800) : 'No description available.',
                tags: tags,
                rating: rating,
                ratingsCount: ratingsCount,
                obscurityTier: obscurityTier,
                obscurityPct: obscurityPct,
                content: `## The Pitch\n${entry.pitch || ''}\n\n## The Truth\n${entry.truth || ''}\n\n## The Core\n${entry.core || ''}`,
                image: entry.image_filename ? 'Images/' + entry.image_filename : fallbackUrl,
                created_at: entry.created_at || '1970-01-01T00:00:00Z' 
            };
        });
        
        if(!media.length){g.innerHTML='<div class="loading error-message">Archive is empty.</div>';return;} 
        
        data.entries.forEach(entry => {
            if (entry.origin) entry.origin.split(',').map(t => t.trim()).filter(t => t).forEach(t => uniqueCountries.add(t));
            if (entry.mood) entry.mood.split(',').map(t => t.trim()).filter(t => t).forEach(t => uniqueMoods.add(t));
            if (entry.sub_genres) entry.sub_genres.split(',').map(t => t.trim()).filter(t => t).forEach(t => uniqueGenres.add(t));
            if (entry.topics) entry.topics.split(',').map(t => t.trim()).filter(t => t).forEach(t => uniqueTopics.add(t));
        });
        
        currentFilteredMedia=[...media]; populateDropdowns(); buildSiteMosaic(); loadMedia(); 

        const urlParams = new URLSearchParams(window.location.search);
        const viewSlug = urlParams.get('v');
        if (viewSlug) {
            const targetMedia = media.find(m => m.slug === viewSlug);
            if (targetMedia) {
                setTimeout(() => openModal(targetMedia), 300);
            }
        }
        
    }catch(e){g.innerHTML='<div class="loading error-message">Connection Error:<br>'+e.message+'</div>';} 
}

function openModalBySlug(slug) {
    const targetMedia = media.find(m => m.slug === slug);
    if (targetMedia) openModal(targetMedia);
}

function updateHero() { 
    const container = document.getElementById('heroSection');
    if(!media.length) return; 
    
    // Create the Top Picks pool (Rating >= 4 and Obscurity >= 60% OR Ghost)
    const topPicksPool = media.filter(m => m.rating >= 4.0 && (m.obscurityPct >= 60 || m.obscurityTier === 'ghost'));
    
    if (topPicksPool.length === 0) {
        container.classList.add('hidden');
        return;
    }

    // Trigger the fade out animation
    container.classList.add('fade-out');
    
    // Wait for fade out to complete before swapping content
    setTimeout(() => {
        const categories = [
            { name: 'Film', filter: m => m.medium.toLowerCase().includes('film') || m.medium.toLowerCase().includes('movie') },
            { name: 'Novel', filter: m => (m.medium.toLowerCase().includes('novel') || m.medium.toLowerCase().includes('book')) && !m.medium.toLowerCase().includes('graphic') && !m.medium.toLowerCase().includes('visual') },
            { name: 'Anime', filter: m => m.medium.toLowerCase().includes('anime') || m.medium.toLowerCase().includes('animat') },
            { name: 'Graphic Novel', filter: m => m.medium.toLowerCase().includes('graphic') || m.medium.toLowerCase().includes('manga') || m.medium.toLowerCase().includes('comic') },
            { name: 'Game', filter: m => m.medium.toLowerCase().includes('game') || m.medium.toLowerCase().includes('interactive') }
        ];

        let selectedPicks = [];
        
        // 1. Try to get one from each category first
        categories.forEach(cat => {
            const available = topPicksPool.filter(cat.filter);
            if (available.length > 0) {
                // Ensure we don't pick a duplicate title
                const validOptions = available.filter(item => !selectedPicks.find(p => p.title === item.title));
                if (validOptions.length > 0) {
                    const randomPick = validOptions[Math.floor(Math.random() * validOptions.length)];
                    selectedPicks.push(randomPick);
                }
            }
        });

        // 2. If we came up short (less than 5), fill the remaining slots from the general pool
        if (selectedPicks.length < 5) {
            const unusedPicks = topPicksPool.filter(item => !selectedPicks.find(p => p.title === item.title));
            unusedPicks.sort(() => 0.5 - Math.random()); // Shuffle the remaining items
            
            while (selectedPicks.length < 5 && unusedPicks.length > 0) {
                selectedPicks.push(unusedPicks.pop());
            }
        }

        // Randomize the order so mobile users see a different medium featured first each time
        selectedPicks.sort(() => 0.5 - Math.random());

        let gridHtml = '';
        
        selectedPicks.forEach(r => {
            const mC = getMoodColorVar(r.tags.mood[0]||'Unknown'); 
            const mdC = getMediumColorVar(r.medium); 
            const safe = encodeURIComponent(r.title).replace(/'/g,"%27"); 
            const fb = 'https://placehold.co/400x600/'+getMoodHexForPlaceholder(r.tags.mood[0]||'Unknown')+'/000000?text='+safe; 
            
            gridHtml += `
                <div class="top-pick-card" style="--theme-mood: ${mC}; --theme-mood-dim: color-mix(in srgb, ${mC} 30%, transparent); --theme-med: ${mdC}; --theme-med-dim: color-mix(in srgb, ${mdC} 15%, transparent);" onclick='openModalBySlug("${r.slug}")'>
                    <img src="${r.image}" onerror="this.onerror=null;this.src='${fb}'" alt="${r.title}">
                    <div class="top-pick-content">
                        <div><span class="medium-badge" style="margin-bottom: 0.5rem; display: inline-flex;">${r.medium}</span></div>
                        <div class="top-pick-title">${r.title} <span class="top-pick-year">${r.year}</span></div>
                        <div class="top-pick-badges">
                            ${generateMetricsHtml(r)}
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = `
            <div class="top-picks-header"><h2>Top Archival Picks</h2></div>
            <div class="top-picks-grid">
                ${gridHtml}
            </div>
        `;
        
        container.classList.remove('hidden');
        container.classList.remove('fade-out');
    }, 500); 
}

function loadMedia() { 
    const g = document.getElementById('mediaGrid'), h = document.getElementById('heroSection'); 
    if(!media.length)return; g.innerHTML=''; 
    
    const mf = document.querySelector('.filter-btn.active').dataset.filter; 
    const cf = document.getElementById('countryFilter').value;
    const uf = document.getElementById('moodFilter').value;
    const gf = document.getElementById('genreFilter').value;
    const tf = document.getElementById('topicFilter').value; 
    const rf = document.getElementById('ratingFilter').value;
    const of = document.getElementById('obscurityFilter').value;
    const sq = document.getElementById('searchInput').value.toLowerCase(); 
    const sortVal = document.getElementById('sortFilter').value;
    
    const fl = media.filter(m => { 
        if(mf !== 'all') {
            if (mf === 'Novel') {
                if (!m.medium.includes('Novel') || m.medium.includes('Graphic') || m.medium.includes('Visual')) return false;
            } else {
                if (!m.medium.includes(mf)) return false; 
            }
        }
        
        if(cf!=='all'&&!m.tags.country.includes(cf))return false; 
        if(uf!=='all'&&!m.tags.mood.includes(uf))return false; 
        if(gf!=='all'&&!m.tags.genre.includes(gf))return false; 
        if(tf!=='all'&&!m.tags.topic.includes(tf))return false; 
        
        if (rf !== 'all') {
            if (m.rating === null) return false; 
            if (m.rating < parseFloat(rf)) return false;
        }
        if (of !== 'all' && m.obscurityTier !== of) return false;
        
        if(sq&&!(m.title+' '+m.pitch+' '+m.content).toLowerCase().includes(sq))return false; 
        return true; 
    });

    fl.sort((a, b) => {
        if (sortVal === 'year') {
            const yearA = a.year ? parseInt(a.year.replace(/\D/g, '')) : 0;
            const yearB = b.year ? parseInt(b.year.replace(/\D/g, '')) : 0;
            return yearB - yearA; 
        } else if (sortVal === 'title') {
            return a.title.localeCompare(b.title); 
        } else {
            return new Date(b.created_at) - new Date(a.created_at);
        }
    });
    
    currentFilteredMedia=fl; 
    
    if(!fl.length){
        h.classList.add('hidden');
        g.innerHTML='<div class="loading">No visions match these parameters.</div>';
        return;
    } 
    
    const isFiltering = sq.length > 0 || mf !== 'all' || cf !== 'all' || uf !== 'all' || gf !== 'all' || tf !== 'all' || rf !== 'all' || of !== 'all';
    
    if(isFiltering) {
        h.classList.add('hidden');
    } else {
        updateHero();
        if(heroInterval) clearInterval(heroInterval);
        heroInterval = setInterval(updateHero, 30000); 
    } 
    
    fl.forEach((m,i)=>{
        const c=document.createElement('div');c.className='card';c.style.animationDelay=(i*0.05)+'s';
        const mC=getMoodColorVar(m.tags.mood[0]||'Unknown'),mdC=getMediumColorVar(m.medium),safe=encodeURIComponent(m.title).replace(/'/g,"%27"),fb='https://placehold.co/400x600/'+getMoodHexForPlaceholder(m.tags.mood[0]||'Unknown')+'/000000?text='+safe;
        c.style.setProperty('--theme-mood',mC);c.style.setProperty('--theme-mood-dim','color-mix(in srgb,'+mC+' 30%,transparent)');
        c.style.setProperty('--theme-med',mdC);c.style.setProperty('--theme-med-dim','color-mix(in srgb,'+mdC+' 15%,transparent)');
        
        let td=m.tags.genre.length>0||m.tags.mood.length>0?'<div class="tag-display">'+[...m.tags.genre,...m.tags.mood].slice(0,2).join(' • ')+'</div>':'';
        
        c.innerHTML=`
            <img src="${m.image}" alt="${m.title}" onerror="this.onerror=null;this.src='${fb}'">
            <div class="card-hover-content">
                <div class="badge-row">
                    <span class="medium-badge" style="margin-bottom:0;">${m.medium}</span>
                </div>
                ${generateMetricsHtml(m)}
                ${td}
                <p class="pitch">${m.pitch}</p>
            </div>
            <div class="card-title-bar"><h2>${m.title} ${m.year}</h2></div>
        `;
        c.onclick=()=>openModal(m);g.appendChild(c);
    }); 
}

window.copyShareLink = function(btn, slug) {
    const url = window.location.origin + window.location.pathname + '?v=' + slug;
    navigator.clipboard.writeText(url).then(() => {
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '✓ Copied';
        setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
    }).catch(err => {
        console.error('Failed to copy text: ', err);
        btn.innerHTML = '✗ Error';
        setTimeout(() => { btn.innerHTML = 'Share'; }, 2000);
    });
};

function openModal(mObj) { 
    if(!mObj||!mObj.content)return; 
    
    const newUrl = window.location.pathname + '?v=' + mObj.slug;
    window.history.replaceState(null, '', newUrl);
    
    const m=document.getElementById('modal'), i=document.getElementById('modalImg'), ibg=document.getElementById('modalImgBg'), s=encodeURIComponent(mObj.title).replace(/'/g,"%27"), mdC=getMediumColorVar(mObj.medium); 
    m.style.setProperty('--theme-med',mdC); m.style.setProperty('--theme-med-dim','color-mix(in srgb,'+mdC+' 15%,transparent)'); 
    
    i.src=mObj.image; 
    ibg.src=mObj.image;
    
    const pm=mObj.tags.mood[0]||'Unknown'; 
    i.onerror=function(){
        this.onerror=null;
        const fallback = 'https://placehold.co/600x900/'+getMoodHexForPlaceholder(pm)+'/000000?text='+s;
        this.src=fallback;
        ibg.src=fallback;
    }; 
    
    let t = mObj.content.replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/^(.+)$/gm,'<p>$1</p>').replace(/<p><\/p>/g,''); 
    
    let allTags = [...mObj.tags.country,...mObj.tags.mood,...mObj.tags.genre,...mObj.tags.topic]; 
    allTags = [...new Set(allTags)]; 
    let tagsHtml = allTags.length > 0 ? '<div class="hero-tags" style="margin-top: 0.5rem; margin-bottom: 0;">' + allTags.map(tag => '<span class="hero-tag">'+tag+'</span>').join('') + '</div>' : '';
    
    document.getElementById('modalBody').innerHTML=`
        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap;">
            <div>
                <div class="hero-info-header" style="margin-bottom: 0.5rem;">
                    <span class="medium-badge" style="margin-bottom:0;">${mObj.medium}</span>
                    <span class="year" style="color: var(--text-muted); font-weight: 600;">${mObj.year}</span>
                </div>
                <h2 style="margin-top: 0; margin-bottom: 0.25rem;">${mObj.title}</h2>
            </div>
        </div>
        ${mObj.creator ? `<div style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0.75rem;">${mObj.creator}</div>` : ''}
        ${generateMetricsHtml(mObj)}
        ${tagsHtml}
        <div style="margin-top: 0.75rem;">
            <button class="share-btn" onclick="window.copyShareLink(this, '${mObj.slug}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Share
            </button>
        </div>
        <div style="margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
            ${t}
        </div>
    `; 
    m.classList.add('open'); 
}

function closeModal() { 
    document.getElementById('modal').classList.remove('open'); 
    window.history.replaceState(null, '', window.location.pathname);
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function openStats() {
    if(!media.length) return;
    const statsModal = document.getElementById('statsModal');
    
    let total = media.length;
    let mediums = {}, moods = {}, origins = {};
    
    media.forEach(m => {
        mediums[m.medium] = (mediums[m.medium] || 0) + 1;
        if(m.tags.mood) m.tags.mood.forEach(x => moods[x] = (moods[x] || 0) + 1);
        if(m.tags.country) m.tags.country.forEach(x => origins[x] = (origins[x] || 0) + 1);
    });

    const sortObj = obj => Object.entries(obj).sort((a,b) => b[1] - a[1]);
    let sm = sortObj(mediums);
    let smo = sortObj(moods).slice(0, 8);
    let so = sortObj(origins).slice(0, 8);
    
    const maxM = Math.max(...sm.map(x=>x[1])) || 1;
    const maxMo = Math.max(...smo.map(x=>x[1])) || 1;
    const maxO = Math.max(...so.map(x=>x[1])) || 1;

    let html = `
        <div class="total-count-box">
            <div class="label">Total Catalogued Visions</div>
            <div class="number">${total}</div>
        </div>
        <div class="stats-grid">
            <div class="stat-section">
                <h3>By Medium</h3>
                ${sm.map(x => `
                    <div class="stat-row">
                        <div class="stat-label">${x[0]}</div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: 0%; background: ${getMediumColorVar(x[0])}; color: ${getMediumColorVar(x[0])};" data-width="${(x[1]/maxM)*100}%"></div></div>
                        <div class="stat-value">${x[1]}</div>
                    </div>
                `).join('')}
                
                <h3 style="margin-top: 3rem;">Top Vibrations (Moods)</h3>
                ${smo.map(x => `
                    <div class="stat-row">
                        <div class="stat-label">${x[0]}</div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: 0%; background: ${getMoodColorVar(x[0])}; color: ${getMoodColorVar(x[0])};" data-width="${(x[1]/maxMo)*100}%"></div></div>
                        <div class="stat-value">${x[1]}</div>
                    </div>
                `).join('')}
            </div>
            <div class="stat-section">
                <h3>Top Origins</h3>
                ${so.map(x => `
                    <div class="stat-row">
                        <div class="stat-label">${x[0]}</div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: 0%; background: #9ca3af;" data-width="${(x[1]/maxO)*100}%"></div></div>
                        <div class="stat-value">${x[1]}</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
    
    document.getElementById('statsBody').innerHTML = html;
    
    setTimeout(() => {
        document.querySelectorAll('.stat-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.width;
        });
    }, 100);
    
    statsModal.classList.add('open');
}

function closeStats() { document.getElementById('statsModal').classList.remove('open'); }
document.getElementById('statsModal').addEventListener('click',function(e){if(e.target===this)closeStats();});

// Filters
document.querySelectorAll('.filter-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');loadMedia();};});

loadMediaList();
</script>
</body>
