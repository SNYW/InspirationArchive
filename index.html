<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiration Archive</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
            --accent: #ff2d6a;
            --accent-dim: #ff2d6a40;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
            overflow-x: hidden;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        h1 {
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        .loading {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
            padding: 3rem;
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        /* --- HERO HIGHLIGHT SECTION --- */
        .hero-container {
            display: flex;
            gap: 2rem;
            background: linear-gradient(135deg, var(--card-bg), #000);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 3rem;
            transition: opacity 0.5s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .hero-container:hover {
            border-color: var(--accent);
        }
        .hero-container.hidden { display: none; }
        .hero-container.fade-out { opacity: 0; }
        .hero-poster {
            width: 240px;
            flex-shrink: 0;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.9);
            aspect-ratio: 2 / 3;
            object-fit: cover;
        }
        .hero-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .hero-info h2 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 0.2rem;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .hero-info .meta {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .hero-info .pitch {
            font-size: 1.1rem;
            color: var(--text);
            max-width: 800px;
        }
        .hero-tag {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }
        /* --- MAIN GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .card:hover {
            border-color: var(--accent);
            transform: scale(1.05);
            z-index: 10;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }
        .card:hover img {
            opacity: 0.3;
        }
        .card-title-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        .card-title-bar h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
        }
        .card-hover-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 1.5rem;
            opacity: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .card:hover .card-hover-content {
            opacity: 1;
        }
        .card .medium {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
            margin-bottom: 1rem;
            align-self: flex-start;
            border-radius: 3px;
        }
        .card .pitch {
            font-size: 0.9rem;
            color: #e0e0e0;
            text-shadow: 1px 1px 2px #000;
        }
        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            padding: 2rem;
            overflow-y: auto;
            z-index: 100;
        }
        .modal.open { display: block; }
        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
        }
        .modal h2 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .modal h3 {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: #666;
            font-size: 0.8rem;
        }
        /* Mobile */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .hero-container { flex-direction: column; padding: 1.5rem; align-items: center; text-align: center; }
            .hero-poster { width: 160px; }
            .hero-info h2 { font-size: 1.8rem; }
            .hero-info .meta { font-size: 0.9rem; margin-bottom: 1rem; }
            .hero-info .pitch { font-size: 0.95rem; }
            .hero-tag { align-self: center; }
            .card-title-bar { padding: 2rem 0.5rem 0.5rem; }
            .card-title-bar h2 { font-size: 0.85rem; }
            .card-hover-content { padding: 0.75rem; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); justify-content: flex-start; }
            .card .medium { font-size: 0.65rem; margin-bottom: 0.5rem; }
            .card .pitch { font-size: 0.75rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Inspiration Archive</h1>
        <p class="subtitle">Sci-Fi Media for Cyberpunk RED Campaign</p>
    </header>
    <div id="heroSection" class="hero-container">
    </div>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Novel">Novels</button>
        <button class="filter-btn" data-filter="Short Story">Short Stories</button>
        <button class="filter-btn" data-filter="Film">Films</button>
        <button class="filter-btn" data-filter="Anime">Anime</button>
    </div>
    <div id="mediaGrid">
        <div class="loading">Loading archive...</div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>
    <footer>
        <p>Built for the Silent Witness Cyberpunk RED Campaign</p>
    </footer>
    <script>
        let media = [];
        
        // Parse markdown file to extract metadata
        function parseMarkdownFile(filename, content) {
            const lines = content.split('\n');
            let title = filename.replace('.md', '').replace(/_/g, ' ');
            let year = '';
            let medium = 'Unknown';
            let pitch = '';
            
            // Extract title and year from first heading
            const titleMatch = content.match(/^#\s+(.+?)\s*\((\d{4})\)/m);
            if (titleMatch) {
                title = titleMatch[1];
                year = titleMatch[2];
            }
            
            // Extract medium
            const mediumMatch = content.match(/\*\*Medium:\*\*\s*(.+)/);
            if (mediumMatch) {
                medium = mediumMatch[1].trim();
            }
            
            // Extract pitch (first paragraph of The Pitch section)
            const pitchMatch = content.match(/##\s*The\s+Pitch.*?\n\n(.+?)(?=\n##|\n#$)/s);
            if (pitchMatch) {
                pitch = pitchMatch[1].trim().substring(0, 200);
                // Clean up the pitch
                pitch = pitch.replace(/\n+/g, ' ').substring(0, 200);
            }
            
            return {
                title: title,
                year: year,
                medium: medium,
                pitch: pitch || 'No description available.',
                file: 'Archive/' + filename,
                image: 'Images/' + filename.replace('.md', '.jpg')
            };
        }
        
        // Fetch all markdown files from Archive folder
        async function loadMediaList() {
            try {
                // Fetch the archive directory listing via GitHub API
                const response = await fetch('https://api.github.com/repos/SNYW/InspirationArchive/contents/Archive');
                const files = await response.json();
                
                // Filter for markdown files and sort alphabetically
                const mdFiles = files
                    .filter(f => f.name.endsWith('.md'))
                    .sort((a, b) => a.name.localeCompare(b.name));
                
                // Fetch each file content in parallel
                const mediaPromises = mdFiles.map(async (file) => {
                    try {
                        const contentResponse = await fetch(file.download_url);
                        const content = await contentResponse.text();
                        return parseMarkdownFile(file.name, content);
                    } catch (e) {
                        console.error('Error loading', file.name, e);
                        return null;
                    }
                });
                
                media = (await Promise.all(mediaPromises)).filter(m => m !== null);
                
                // Hide loading, show content
                document.querySelector('.loading').style.display = 'none';
                
                // Initialize the UI
                loadMedia();
                
            } catch (error) {
                console.error('Error loading media list:', error);
                document.getElementById('mediaGrid').innerHTML = '<div class="loading">Error loading archive. Please refresh.</div>';
            }
        }
        
        // --- HERO HIGHLIGHT LOGIC ---
        let heroInterval;
        function updateHero() {
            const heroSection = document.getElementById('heroSection');
            if (heroSection.classList.contains('hidden')) return;
            
            heroSection.classList.add('fade-out');
            setTimeout(() => {
                const randomMedia = media[Math.floor(Math.random() * media.length)];
                const imgPath = randomMedia.image;
                const fallbackImg = 'https://placehold.co/400x600/1a1a1a/ff2d6a?text=' + encodeURIComponent(randomMedia.title);
                
                heroSection.innerHTML = `
                    <img class="hero-poster" src="${imgPath}" onerror="this.src='${fallbackImg}'" alt="${randomMedia.title} Poster">
                    <div class="hero-info">
                        <span class="hero-tag">Featured ${randomMedia.medium}</span>
                        <h2>${randomMedia.title}</h2>
                        <div class="meta">Released: ${randomMedia.year}</div>
                        <p class="pitch">${randomMedia.pitch}</p>
                    </div>
                `;
                heroSection.onclick = () => openModal(randomMedia.file);
                heroSection.classList.remove('fade-out');
            }, 500);
        }
        
        // --- MAIN GRID LOGIC ---
        async function loadMedia() {
            const grid = document.getElementById('mediaGrid');
            const heroSection = document.getElementById('heroSection');
            
            if (media.length === 0) return;
            
            // Clear grid (remove loading if present)
            const loading = grid.querySelector('.loading');
            if (loading) loading.style.display = 'none';
            grid.innerHTML = '';
            
            const filter = document.querySelector('.filter-btn.active').dataset.filter;
            
            if (filter === 'all') {
                heroSection.classList.remove('hidden');
            } else {
                heroSection.classList.add('hidden');
            }
            
            const filtered = filter === 'all' ? media : media.filter(m => m.medium === filter);
            
            filtered.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgPath = m.image;
                const fallbackImg = 'https://placehold.co/400x600/1a1a1a/ff2d6a?text=' + encodeURIComponent(m.title);
                
                card.innerHTML = `
                    <img src="${imgPath}" alt="${m.title} Cover Art" onerror="this.src='${fallbackImg}'">
                    <div class="card-hover-content">
                        <span class="medium">${m.medium}</span>
                        <p class="pitch">${m.pitch}</p>
                    </div>
                    <div class="card-title-bar">
                        <h2>${m.title} (${m.year})</h2>
                    </div>
                `;
                card.onclick = () => openModal(m.file);
                grid.appendChild(card);
            });
        }
        
        // --- MODAL & UTILS ---
        async function openModal(file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error("File not found");
                const content = await response.text();
                document.getElementById('modalBody').innerHTML = parseMarkdownForModal(content);
                document.getElementById('modal').classList.add('open');
            }
            catch(e) {
                document.getElementById('modalBody').innerHTML = `
                    <h2>File Unavailable</h2>
                    <p style="color: #888;">Could not load <code>${file}</code>.</p>
                `;
                document.getElementById('modal').classList.add('open');
            }
        }
        
        function parseMarkdownForModal(text) {
            return text
                .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(.+)$/gm, '<p>$1</p>');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }
        
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadMedia();
            };
        });
        
        // Initialize - load media from GitHub
        loadMediaList();
        
        // Auto-rotate Hero every 60 seconds
        heroInterval = setInterval(updateHero, 60000);
    </script>
</body>
</html>
