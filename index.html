<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiration Archive</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
            --accent: #ff2d6a;
            --accent-dim: #ff2d6a40;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
            overflow-x: hidden;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        h1 {
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        /* --- HERO HIGHLIGHT SECTION --- */
        .hero-container {
            display: flex;
            gap: 2rem;
            background: linear-gradient(135deg, var(--card-bg), #000);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 3rem;
            transition: opacity 0.5s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .hero-container:hover {
            border-color: var(--accent);
        }
        .hero-container.hidden { display: none; }
        .hero-container.fade-out { opacity: 0; }
        .hero-poster {
            width: 240px;
            flex-shrink: 0;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.9);
            aspect-ratio: 2 / 3;
            object-fit: cover;
        }
        .hero-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .hero-info h2 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 0.2rem;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .hero-info .meta {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .hero-info .pitch {
            font-size: 1.1rem;
            color: var(--text);
            max-width: 800px;
        }
        .hero-tag {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }
        /* --- MAIN GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .card:hover {
            border-color: var(--accent);
            transform: scale(1.05);
            z-index: 10;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }
        .card:hover img {
            opacity: 0.3;
            /* Darker image on hover for better text readability */
        }
        .card-title-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        .card-title-bar h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
        }
        .card-hover-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 1.5rem;
            opacity: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .card:hover .card-hover-content {
            opacity: 1;
        }
        .card .medium {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
            margin-bottom: 1rem;
            align-self: flex-start;
            border-radius: 3px;
        }
        .card .pitch {
            font-size: 0.9rem;
            color: #e0e0e0;
            text-shadow: 1px 1px 2px #000;
        }
        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            padding: 2rem;
            overflow-y: auto;
            z-index: 100;
        }
        .modal.open { display: block; }
        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
        }
        .modal h2 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .modal h3 {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: #666;
            font-size: 0.8rem;
        }
        /* ========================================================= MOBILE OPTIMIZATIONS ========================================================= */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.8rem; }
            /* Force Grid into 2 Columns */
            .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            /* Make Hero Stack Vertically */
            .hero-container {
                flex-direction: column;
                padding: 1.5rem;
                align-items: center;
                text-align: center;
            }
            .hero-poster { width: 160px; }
            .hero-info h2 { font-size: 1.8rem; }
            .hero-info .meta { font-size: 0.9rem; margin-bottom: 1rem; }
            .hero-info .pitch { font-size: 0.95rem; }
            .hero-tag { align-self: center; }
            /* Fix Mobile Tap/Hover Overlay */
            .card-title-bar { padding: 2rem 0.5rem 0.5rem; }
            .card-title-bar h2 { font-size: 0.85rem; }
            .card-hover-content {
                padding: 0.75rem;
                background: rgba(0, 0, 0, 0.85);
                /* Darker backdrop */
                backdrop-filter: blur(4px);
                /* Sleek blur to make text pop */
                justify-content: flex-start;
            }
            .card .medium { font-size: 0.65rem; margin-bottom: 0.5rem; }
            .card .pitch {
                font-size: 0.75rem;
                line-height: 1.3;
                /* Clamp text to prevent overflow on small screens */
                display: -webkit-box;
                -webkit-line-clamp: 6;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Inspiration Archive</h1>
        <p class="subtitle">Sci-Fi Media for Cyberpunk RED Campaign</p>
    </header>
    <div id="heroSection" class="hero-container">
    </div>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Novel">Novels</button>
        <button class="filter-btn" data-filter="Short Story">Short Stories</button>
        <button class="filter-btn" data-filter="Film">Films</button>
        <button class="filter-btn" data-filter="Anime">Anime</button>
    </div>
    <div class="grid" id="mediaGrid"></div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>
    <footer>
        <p>Built for the Silent Witness Cyberpunk RED Campaign</p>
    </footer>
    <script>
        const media = [
            { title: "334", year: "1972", medium: "Novel", pitch: "A haunting collection of interconnected tales set in a dystopian future New York, exploring class divide and urban decay.", file: "334_1972.md" },
            { title: "A Martian Odyssey", year: "1934", medium: "Short Story", pitch: "One of the first great science fiction short stories, following an astronaut's strange journey across Mars.", file: "A_Martian_Odyssey_1934.md" },
            { title: "A Memory Called Empire", year: "2019", medium: "Novel", pitch: "An ambassador from a small space station must navigate court intrigue in a massive empire while carrying the memories of her predecessor.", file: "A_Memory_Called_Empire_2019.md" },
            { title: "A Prayer for the Crown-Shy", year: "2022", medium: "Novel", pitch: "A gentle post-apocalyptic fantasy about a monk and a robot traveling together.", file: "A_Prayer_for_the_Crown-Shy_2022.md" },
            { title: "A Psalm for the Wild-Built", year: "2021", medium: "Novel", pitch: "A robot and a monk explore what it means to find purpose in a world without humans.", file: "A_Psalm_for_the_Wild_Built_2021.md" },
            { title: "A Saucer of Loneliness", year: "1953", medium: "Short Story", pitch: "A woman discovers she is the only person who can see alien saucers hovering above Earth.", file: "A_Saucer_of_Loneliness_1953.md" },
            { title: "A World Out of Time", year: "1976", medium: "Novel", pitch: "A man wakes up 200 years in the future to find Earth transformed beyond recognition.", file: "A_World_Out_of_Time_1976.md" },
            { title: "All Systems Red", year: "2017", medium: "Novella", pitch: "A security android with self-awareness just wants to watch TV shows in peace.", file: "All_Systems_Red_2017.md" },
            { title: "An Unkindness of Ghosts", year: "2017", medium: "Novel", pitch: "A neurodivergent scholar uncovers dark secrets aboard a generation ship.", file: "An_Unkindness_of_Ghosts_2017.md" },
            { title: "Angels' Egg", year: "1985", medium: "Film", pitch: "A surreal, dialogue-light film exploring faith, art, and apocalypse through mysterious imagery.", file: "Angels_Egg_1985.md", image: "Images/Angels_Egg_1985.jpg" },
            { title: "Arzach", year: "1975", medium: "Graphic Novel", pitch: "A wordless French sci-fi comic by Moebius - surreal short stories of a warrior on a pterodactyl across bizarre landscapes.", file: "Archive/Arzach_1975.md" },
            { title: "Binti", year: "2015", medium: "Novella", pitch: "A Himba girl defies tradition to attend university in space, carrying ancient secrets.", file: "Binti_2015.md" },
            { title: "City", year: "1952", medium: "Short Story", pitch: "A classic tale of a city that is alive, evolving over millions of years.", file: "City_1952.md" },
            { title: "Counterweight", year: "2021", medium: "Novella", pitch: "A deep space station becomes the center of political intrigue and revolution.", file: "Counterweight_2021.md" },
            { title: "Cyber City Oedo 808", year: "1990", medium: "Anime", pitch: "Three cyberpunk criminals are offered freedom if they hunt down a rogue AI.", file: "Cyber_City_Oedo_808_1990.md", image: "Images/Cyber_City_Oedo_808_1990.jpg" },
            { title: "Dorsai", year: "1959", medium: "Novel", pitch: "A future where mercenaries from the planet Dorsai are the ultimate soldiers.", file: "Dorsai_1959.md" },
            { title: "Ergo Proxy", year: "2006", medium: "Anime", pitch: "In a domed city, proxy androids begin questioning their own existence.", file: "Ergo_Proxy_2006.md", image: "Images/Ergo_Proxy_2006.jpg" },
            { title: "Eurêka", year: "1972", medium: "Film", pitch: "A surreal exploration of a post-apocalyptic world and its last survivors.", file: "Euremas_Dam_1972.md" },
            { title: "Exhalation", year: "2008", medium: "Short Story", pitch: "An alien autopsy reveals a universe running out of energy.", file: "Exhalation_2008.md" },
            { title: "Fantastic Planet", year: "1973", medium: "Animated Film", pitch: "A surreal French animated film about giant Oms and their rulers the Draags.", file: "Fantastic_Planet_1973.md" },
            { title: "The Fourth Mansions", year: "1969", medium: "Novel", pitch: "A man investigates supernatural forces while navigating political revolution.", file: "Fourth_Mansions_1969.md" },
            { title: "The Last Man on Earth", year: "1964", medium: "Film", pitch: "Vincent Price stars as the last human in this obscure adaptation of 'I Am Legend' - a melancholy post-apocalyptic classic.", file: "Archive/The_Last_Man_on_Earth_1964.md", image: "Images/The_Last_Man_on_Earth_1964.jpg" },
        ];
        // --- HERO HIGHLIGHT LOGIC ---
        let heroInterval;
        function updateHero() {
            const heroSection = document.getElementById('heroSection');
            // Check if hero is hidden (because a filter is active), if so, do nothing.
            if (heroSection.classList.contains('hidden')) return;
            // Trigger CSS fade out
            heroSection.classList.add('fade-out');
            // Wait for fade out to complete before changing content
            setTimeout(() => {
                const randomMedia = media[Math.floor(Math.random() * media.length)];
                const imgPath = 'Images/' + randomMedia.file.replace('.md', '.jpg');
                const fallbackImg = randomMedia.image || 'https://placehold.co/400x600/1a1a1a/ff2d6a?text=' + encodeURIComponent(randomMedia.title);
                heroSection.innerHTML = `
                    <img class="hero-poster" src="${imgPath}" onerror="this.src='${fallbackImg}'" alt="${randomMedia.title} Poster">
                    <div class="hero-info">
                        <span class="hero-tag">Featured ${randomMedia.medium}</span>
                        <h2>${randomMedia.title}</h2>
                        <div class="meta">Released: ${randomMedia.year}</div>
                        <p class="pitch">${randomMedia.pitch}</p>
                    </div>
                `;
                // Clicking the hero opens the modal just like a regular card
                heroSection.onclick = () => openModal('Archive/' + randomMedia.file);
                // Fade back in
                heroSection.classList.remove('fade-out');
            }, 500); // 500ms matches the CSS transition time
        }
        // --- MAIN GRID LOGIC ---
        async function loadMedia() {
            const grid = document.getElementById('mediaGrid');
            const heroSection = document.getElementById('heroSection');
            grid.innerHTML = '';
            const filter = document.querySelector('.filter-btn.active').dataset.filter;
            // Handle Hero Visibility: Only show on "All"
            if (filter === 'all') {
                heroSection.classList.remove('hidden');
                updateHero(); // Instantly update when returning to 'All'
            } else {
                heroSection.classList.add('hidden');
            }
            const filtered = filter === 'all' ? media : media.filter(m => m.medium === filter);
            filtered.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgPath = 'Images/' + m.file.replace('.md', '.jpg');
                card.innerHTML = `
                    <img src="${imgPath}" alt="${m.title} Cover Art" onerror="this.src='${m.image || 'https://placehold.co/400x600/1a1a1a/ff2d6a?text=' + encodeURIComponent(m.title)}'">
                    <div class="card-hover-content">
                        <span class="medium">${m.medium}</span>
                        <p class="pitch">${m.pitch}</p>
                    </div>
                    <div class="card-title-bar">
                        <h2>${m.title} (${m.year})</h2>
                    </div>
                `;
                card.onclick = () => openModal('Archive/' + m.file);
                grid.appendChild(card);
            });
        }
        // --- MODAL & UTILS ---
        async function openModal(file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error("File not found");
                const content = await response.text();
                document.getElementById('modalBody').innerHTML = parseMarkdown(content);
                document.getElementById('modal').classList.add('open');
            }
            catch(e) {
                document.getElementById('modalBody').innerHTML = `
                    <h2>File Unavailable</h2>
                    <p style="color: #888;">Could not load <code>${file}</code>.</p>
                    <p style="margin-top: 1rem; font-size: 0.9rem;"><em>Note: If you are opening this HTML file directly in your browser (file://), your browser's security settings block the script from fetching local Markdown files. Run a local development server to load them!</em></p>
                `;
                document.getElementById('modal').classList.add('open');
            }
        }
        function parseMarkdown(text) {
            return text
                .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(.+)$/gm, '<p>$1</p>');
        }
        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadMedia();
            };
        });
        // Initialize Hero and Grid
        loadMedia();
        // Auto-rotate Hero every 60 seconds (60000 ms)
        heroInterval = setInterval(updateHero, 60000);
    </script>
</body>
</html>
