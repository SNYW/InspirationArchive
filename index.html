<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiration Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card-bg: #121216;
            --text: #e0e0e0;
            --border: #2a2a35;
            --accent: #ff2d6a;
            --accent-dim: rgba(255, 45, 106, 0.15);
            --mood-optimistic: #ffd700;
            --mood-pessimistic: #ff2a2a;
            --mood-melancholic: #4169e1;
            --mood-surreal: #b026ff;
            --mood-tense: #ff6600;
            --mood-gritty: #a0522d;
            --mood-satirical: #ccff00;
            --mood-cerebral: #00ffff;
            --mood-eerie: #8fbc8f;
            --mood-unknown: #555555;
            --med-written: #00e5ff;
            --med-film: #ff2d6a;
            --med-animated: #39ff14;
            --med-comic: #ffaa00;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
        }
        .site-bg {
            position: fixed;
            top: -20vh;
            left: -20vw;
            width: 140vw;
            height: 140vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 1rem;
            opacity: 0.15;
            z-index: -1;
            transform: rotate(-5deg);
            pointer-events: none;
        }
        .site-bg img {
            width: 110px;
            height: 165px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            filter: grayscale(60%) contrast(110%);
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 4rem 2rem;
        }
        h1 {
            font-family: 'Michroma', sans-serif;
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 0 0 10px #000, 0 0 20px #000, 0 0 40px #000, 0 0 80px #000, 0 4px 25px rgba(255, 45, 106, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 0;
            display: inline-block;
        }
        .loading {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
            padding: 3rem;
            grid-column: 1 / -1;
            text-shadow: 0 0 10px #000;
        }
        .error-message {
            color: var(--mood-pessimistic);
            border: 1px solid var(--mood-pessimistic);
            background: rgba(255, 42, 42, 0.1);
            padding: 1rem;
            border-radius: 6px;
            backdrop-filter: blur(5px);
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .filter-btn {
            background: rgba(18, 18, 22, 0.85);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            border-radius: 4px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--text);
            background: rgba(255,255,255,0.15);
        }
        .tag-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            padding: 1rem;
            background: rgba(18, 18, 22, 0.85);
            border-radius: 8px;
            border: 1px solid var(--border);
            backdrop-filter: blur(4px);
        }
        .tag-select-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .tag-select-group label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }
        .tag-select {
            background: #000;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            min-width: 150px;
            transition: border-color 0.2s;
        }
        .tag-select:focus {
            border-color: var(--accent);
        }
        .hero-container {
            display: flex;
            gap: 2rem;
            background: linear-gradient(135deg, rgba(18,18,22,0.9), rgba(0,0,0,0.95));
            border: 1px solid var(--border);
            border-top: 3px solid var(--theme-mood);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 3rem;
            transition: all 0.5s ease;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .hero-container::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: radial-gradient(circle at top right, var(--theme-mood-dim), transparent 70%);
            pointer-events: none;
        }
        .hero-container:hover {
            border-color: var(--theme-mood);
            transform: translateY(-2px);
        }
        .hero-container.hidden { display: none; }
        .hero-container.fade-out {
            opacity: 0;
            transform: scale(0.98);
        }
        .hero-poster {
            width: 240px;
            flex-shrink: 0;
            border-radius: 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.9);
            aspect-ratio: 2 / 3;
            object-fit: cover;
            z-index: 1;
        }
        .hero-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
        }
        .hero-info h2 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 0.2rem;
            line-height: 1.1;
            font-weight: 700;
            text-shadow: 0 2px 10px #000;
        }
        .hero-info .meta {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            text-shadow: 0 2px 5px #000;
        }
        .hero-info .pitch {
            font-size: 1.1rem;
            color: var(--text);
            max-width: 800px;
            text-shadow: 0 2px 5px #000;
        }
        .medium-badge {
            display: inline-block;
            background: var(--theme-med);
            color: #000;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
            box-shadow: 0 0 10px var(--theme-med-dim);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: rgba(18,18,22,0.9);
            border: 1px solid var(--border);
            border-top: 3px solid var(--theme-mood);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        .card:hover {
            border-color: var(--theme-mood);
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 10px 30px var(--theme-mood-dim);
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }
        .card:hover img {
            opacity: 0.2;
            filter: grayscale(50%);
        }
        .card-title-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        .card-title-bar h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
        }
        .card-hover-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 1.5rem;
            opacity: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s ease;
            pointer-events: none;
            background: linear-gradient(to bottom, var(--theme-mood-dim) 0%, transparent 50%);
        }
        .card:hover .card-hover-content {
            opacity: 1;
        }
        .card .tag-display {
            font-size: 0.7rem;
            color: #fff;
            margin-bottom: 1rem;
            font-weight: bold;
            opacity: 0.8;
        }
        .card .pitch {
            font-size: 0.95rem;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
            line-height: 1.4;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            padding: 2rem;
            overflow-y: auto;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .modal.open {
            display: block;
        }
        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent);
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover {
            color: #fff;
        }
        .modal h2 {
            color: #fff;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .modal h3 {
            color: var(--text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-top: 2rem;
        }
        .modal p {
            font-size: 1.05rem;
            color: #ccc;
            margin-bottom: 1rem;
        }
        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: #555;
            font-size: 0.8rem;
            text-shadow: 0 0 5px #000;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { padding: 2rem 1rem; }
            h1 { font-size: 2rem; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .hero-container { flex-direction: column; padding: 1.5rem; align-items: center; text-align: center; }
            .hero-poster { width: 160px; }
            .hero-info h2 { font-size: 1.8rem; }
            .hero-info .meta { font-size: 0.9rem; margin-bottom: 1rem; }
            .hero-info .pitch { font-size: 0.95rem; }
            .medium-badge { align-self: center; }
            .card-title-bar { padding: 2rem 0.5rem 0.5rem; }
            .card-title-bar h2 { font-size: 0.85rem; }
            .card-hover-content { padding: 0.75rem; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); justify-content: flex-start; }
            .medium-badge { font-size: 0.6rem; padding: 0.1rem 0.4rem; margin-bottom: 0.25rem; }
            .card .tag-display { font-size: 0.6rem; margin-bottom: 0.5rem; }
            .card .pitch { font-size: 0.75rem; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
        }
    </style>
</head>
<body>
    <div id="siteBg" class="site-bg"></div>
    <header>
        <h1>Inspiration Archive</h1>
    </header>
    <div id="heroSection" class="hero-container hidden"></div>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Novel">Novels</button>
        <button class="filter-btn" data-filter="Short Story">Short Stories</button>
        <button class="filter-btn" data-filter="Film">Films</button>
        <button class="filter-btn" data-filter="Anime">Anime</button>
    </div>
    <div class="tag-filters">
        <div class="tag-select-group">
            <label for="countryFilter">Country</label>
            <select id="countryFilter" class="tag-select" onchange="loadMedia()">
                <option value="all">Any Country</option>
            </select>
        </div>
        <div class="tag-select-group">
            <label for="moodFilter">Mood</label>
            <select id="moodFilter" class="tag-select" onchange="loadMedia()">
                <option value="all">Any Mood</option>
            </select>
        </div>
        <div class="tag-select-group">
            <label for="genreFilter">Sub-Genre</label>
            <select id="genreFilter" class="tag-select" onchange="loadMedia()">
                <option value="all">Any Genre</option>
            </select>
        </div>
        <div class="tag-select-group">
            <label for="topicFilter">Topic</label>
            <select id="topicFilter" class="tag-select" onchange="loadMedia()">
                <option value="all">Any Topic</option>
            </select>
        </div>
    </div>
    <div class="grid" id="mediaGrid">
        <div class="loading">Establishing secure connection to Archive...</div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>
    <footer>
        <p>Built for the Silent Witness Cyberpunk RED Campaign</p>
    </footer>
    <script>
        let media = [];
        let currentFilteredMedia = []; // NEW: Tracks the currently filtered list
        let heroInterval;

        const uniqueCountries = new Set();
        const uniqueMoods = new Set();
        const uniqueGenres = new Set();
        const uniqueTopics = new Set();

        function getMoodColorVar(mood) {
            const m = mood.toLowerCase();
            if (['optimistic', 'pessimistic', 'melancholic', 'surreal', 'tense', 'gritty', 'satirical', 'cerebral', 'eerie'].includes(m)) {
                return `var(--mood-${m})`;
            }
            return 'var(--mood-unknown)';
        }

        function getMoodHexForPlaceholder(mood) {
            const map = {
                'optimistic': 'ffd700',
                'pessimistic': 'ff2a2a',
                'melancholic': '4169e1',
                'surreal': 'b026ff',
                'tense': 'ff6600',
                'gritty': 'a0522d',
                'satirical': 'ccff00',
                'cerebral': '00ffff',
                'eerie': '8fbc8f'
            };
            return map[mood.toLowerCase()] || '555555';
        }

        function getMediumColorVar(medium) {
            const m = medium.toLowerCase();
            if (m.includes('novel') || m.includes('story')) return 'var(--med-written)';
            if (m.includes('anime') || m.includes('animat')) return 'var(--med-animated)';
            if (m.includes('comic') || m.includes('graphic')) return 'var(--med-comic)';
            if (m.includes('film') || m.includes('movie')) return 'var(--med-film)';
            return 'var(--text)';
        }

        function parseMarkdownFile(filename, content) {
            let title = filename.replace('.md', '').replace(/_/g, ' ');
            let year = 'Unknown';
            let medium = 'Unknown';
            let pitch = 'No description available.';
            let tags = { country: [], mood: [], genre: [], topic: [] };

            const titleMatch = content.match(/^#\s+(.+?)(?:\s+\((\d{4})\))?\s*$/m);
            if (titleMatch) {
                title = titleMatch[1].trim();
                if (titleMatch[2]) year = titleMatch[2];
            }

            const mediumMatch = content.match(/\*\*Medium:\*\*\s*(.+)/i);
            if (mediumMatch) medium = mediumMatch[1].trim();

            const tagsMatch = content.match(/\*\*Tags:\*\*(.+?)$/m);
            if (tagsMatch) {
                const categories = tagsMatch[1].split('|').map(s => s.trim());
                categories.forEach(cat => {
                    const cleanCat = cat.replace(/^[^\w]+/, '').trim();
                    const tagList = cleanCat.split(',').map(t => t.trim()).filter(t => t);
                    if (cat.includes('🌍')) {
                        tags.country = tagList;
                        tagList.forEach(t => uniqueCountries.add(t));
                    } else if (cat.includes('🎭')) {
                        tags.mood = tagList;
                        tagList.forEach(t => uniqueMoods.add(t));
                    } else if (cat.includes('📚')) {
                        tags.genre = tagList;
                        tagList.forEach(t => uniqueGenres.add(t));
                    } else if (cat.includes('🧬')) {
                        tags.topic = tagList;
                        tagList.forEach(t => uniqueTopics.add(t));
                    }
                });
            }

            const pitchMatch = content.match(/##\s*The\s+Pitch\s*(.+?)(?=##|#|$)/is);
            if (pitchMatch) {
                pitch = pitchMatch[1].replace(/\n+/g, ' ').trim().substring(0, 200);
                if (pitch.length === 200) pitch += "...";
            }

            return {
                title: title,
                year: year,
                medium: medium,
                pitch: pitch,
                tags: tags,
                content: content,
                image: 'Images/' + filename.replace('.md', '.jpg')
            };
        }

        function populateDropdowns() {
            const populate = (setId, selectId) => {
                const select = document.getElementById(selectId);
                Array.from(setId).sort().forEach(tag => {
                    const option = document.createElement('option');
                    option.value = tag;
                    option.textContent = tag;
                    select.appendChild(option);
                });
            };
            populate(uniqueCountries, 'countryFilter');
            populate(uniqueMoods, 'moodFilter');
            populate(uniqueGenres, 'genreFilter');
            populate(uniqueTopics, 'topicFilter');
        }

        function buildSiteMosaic() {
            const bgContainer = document.getElementById('siteBg');
            if (!bgContainer || media.length === 0) return;
            bgContainer.innerHTML = '';
            const targetCount = 200;
            let displayList = [];
            while (displayList.length < targetCount) {
                const shuffled = [...media].sort(() => 0.5 - Math.random());
                displayList = displayList.concat(shuffled);
            }
            displayList = displayList.slice(0, targetCount);
            displayList.forEach(m => {
                const img = document.createElement('img');
                img.src = m.image;
                const primaryMood = m.tags.mood[0] || 'Unknown';
                const placeholderHex = getMoodHexForPlaceholder(primaryMood);
                const safeTitle = encodeURIComponent(m.title).replace(/'/g, "%27");
                const fallbackImg = `https://placehold.co/120x180/${placeholderHex}/000000?text=${safeTitle}`;
                img.onerror = function() {
                    this.onerror=null;
                    this.src = fallbackImg;
                };
                bgContainer.appendChild(img);
            });
        }

        async function loadMediaList() {
            const grid = document.getElementById('mediaGrid');
            try {
                const response = await fetch('https://api.github.com/repos/SNYW/InspirationArchive/contents/Archive');
                const files = await response.json();
                if (!Array.isArray(files)) throw new Error(files.message || "Could not read the GitHub repository. Is it public?");

                const mdFiles = files.filter(f => f.name.endsWith('.md')).sort((a, b) => a.name.localeCompare(b.name));

                const mediaPromises = mdFiles.map(async (file) => {
                    try {
                        const contentResponse = await fetch(file.download_url);
                        const content = await contentResponse.text();
                        return parseMarkdownFile(file.name, content);
                    } catch (e) { return null; }
                });

                media = (await Promise.all(mediaPromises)).filter(m => m !== null);

                if (media.length === 0) {
                    grid.innerHTML = '<div class="loading error-message">No markdown files found in the Archive folder.</div>';
                    return;
                }

                currentFilteredMedia = [...media]; // Initialize the filtered state
                populateDropdowns();
                buildSiteMosaic();
                grid.innerHTML = ''; // Initialize the grid and hero
                loadMedia();
            } catch (error) {
                grid.innerHTML = `<div class="loading error-message"><strong>Error connecting to GitHub:</strong><br>${error.message}</div>`;
            }
        }

        // --- UPDATED: Hero now strictly uses the filtered array ---
        function updateHero() {
            const heroSection = document.getElementById('heroSection');
            // If the filtered array is empty, do nothing
            if (currentFilteredMedia.length === 0) return;
            heroSection.classList.add('fade-out');

            setTimeout(() => {
                // Pick randomly from the FILTERED list, not the global list
                const r = currentFilteredMedia[Math.floor(Math.random() * currentFilteredMedia.length)];

                const primaryMood = r.tags.mood[0] || 'Unknown';
                const moodColor = getMoodColorVar(primaryMood);
                const medColor = getMediumColorVar(r.medium);
                const placeholderHex = getMoodHexForPlaceholder(primaryMood);

                const safeTitle = encodeURIComponent(r.title).replace(/'/g, "%27");
                const fallbackImg = `https://placehold.co/400x600/${placeholderHex}/000000?text=${safeTitle}`;

                heroSection.style.setProperty('--theme-mood', moodColor);
                heroSection.style.setProperty('--theme-mood-dim', `color-mix(in srgb, ${moodColor} 20%, transparent)`);
                heroSection.style.setProperty('--theme-med', medColor);
                heroSection.style.setProperty('--theme-med-dim', `color-mix(in srgb, ${medColor} 40%, transparent)`);

                heroSection.innerHTML = `
                    <img class="hero-poster" src="${r.image}" onerror="this.onerror=null; this.src='${fallbackImg}'" alt="${r.title} Poster">
                    <div class="hero-info">
                        <span class="medium-badge">${r.medium}</span>
                        <h2>${r.title}</h2>
                        <div class="meta">Released: ${r.year} &nbsp; | &nbsp; ${r.tags.genre.join(', ')}</div>
                        <p class="pitch">${r.pitch}</p>
                    </div>
                `;
                heroSection.onclick = () => openModal(r);
                heroSection.classList.remove('fade-out');
            }, 500);
        }

        function loadMedia() {
            const grid = document.getElementById('mediaGrid');
            const heroSection = document.getElementById('heroSection');
            if (media.length === 0) return;
            grid.innerHTML = '';

            const mediumFilter = document.querySelector('.filter-btn.active').dataset.filter;
            const countryFilter = document.getElementById('countryFilter').value;
            const moodFilter = document.getElementById('moodFilter').value;
            const genreFilter = document.getElementById('genreFilter').value;
            const topicFilter = document.getElementById('topicFilter').value;

            // Generate the new filtered array
            const filtered = media.filter(m => {
                if (mediumFilter !== 'all' && !m.medium.includes(mediumFilter)) return false;
                if (countryFilter !== 'all' && !m.tags.country.includes(countryFilter)) return false;
                if (moodFilter !== 'all' && !m.tags.mood.includes(moodFilter)) return false;
                if (genreFilter !== 'all' && !m.tags.genre.includes(genreFilter)) return false;
                if (topicFilter !== 'all' && !m.tags.topic.includes(topicFilter)) return false;
                return true;
            });

            // Update the global state so the Hero knows what to look at
            currentFilteredMedia = filtered;

            if (filtered.length === 0) {
                // If there are zero results, hide the hero section and show a message
                heroSection.classList.add('hidden');
                grid.innerHTML = '<div class="loading">No media matches those specific filters.</div>';
                return;
            } else {
                // Keep the hero section visible
                heroSection.classList.remove('hidden');
                // Immediately force the hero to update so it displays something from the new search
                updateHero();
                // Reset the interval timer so it doesn't rotate away 2 seconds after you click
                if (heroInterval) clearInterval(heroInterval);
                heroInterval = setInterval(updateHero, 60000);
            }

            filtered.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';

                const primaryMood = m.tags.mood[0] || 'Unknown';
                const moodColor = getMoodColorVar(primaryMood);
                const medColor = getMediumColorVar(m.medium);
                const placeholderHex = getMoodHexForPlaceholder(primaryMood);

                card.style.setProperty('--theme-mood', moodColor);
                card.style.setProperty('--theme-mood-dim', `color-mix(in srgb, ${moodColor} 30%, transparent)`);
                card.style.setProperty('--theme-med', medColor);

                const safeTitle = encodeURIComponent(m.title).replace(/'/g, "%27");
                const fallbackImg = `https://placehold.co/400x600/${placeholderHex}/000000?text=${safeTitle}`;

                let tagDisplay = '';
                if (m.tags.genre.length > 0 || m.tags.mood.length > 0) {
                    const displayTags = [...m.tags.genre, ...m.tags.mood].slice(0, 2);
                    tagDisplay = `<div class="tag-display">#${displayTags.join(' #')}</div>`;
                }

                card.innerHTML = `
                    <img src="${m.image}" alt="${m.title} Cover Art" onerror="this.onerror=null; this.src='${fallbackImg}'">
                    <div class="card-hover-content">
                        <span class="medium-badge">${m.medium}</span>
                        ${tagDisplay}
                        <p class="pitch">${m.pitch}</p>
                    </div>
                    <div class="card-title-bar">
                        <h2>${m.title} (${m.year})</h2>
                    </div>
                `;
                card.onclick = () => openModal(m);
                grid.appendChild(card);
            });
        }

        function openModal(mediaObj) {
            if (!mediaObj || !mediaObj.content) return;
            document.getElementById('modalBody').innerHTML = parseMarkdownForModal(mediaObj.content);
            document.getElementById('modal').classList.add('open');
        }

        function parseMarkdownForModal(text) {
            return text
                .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(.+)$/gm, '<p>$1</p>');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadMedia();
            };
        });

        // Boot up!
        loadMediaList();
    </script>
</body>
</html>
